# Local dev compose. Production uses platform-native services (Railway / Fly / VPS).
# Build context is the REPO ROOT so the Dockerfile can pull from packages/ and apps/.

services:
  postgres:
    image: postgres:16-alpine
    container_name: bnmp-postgres
    environment:
      POSTGRES_USER: bnmp
      POSTGRES_PASSWORD: bnmp_dev_password
      POSTGRES_DB: bnmp
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bnmp -d bnmp']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    container_name: bnmp-worker
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://bnmp:bnmp_dev_password@postgres:5432/bnmp
      WORKER_PORT: '8080'
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '8080:8080'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8080/health/live']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres-data:
